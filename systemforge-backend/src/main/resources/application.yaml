server:
  port: 8080
  servlet:
    context-path: /
  error:
    include-message: never       # Never expose internal error messages to client
    include-stacktrace: never

spring:
  application:
    name: systemforge-backend
  main:
    allow-bean-definition-overriding: true
  cache:
    type: ${SPRING_CACHE_TYPE:none}

  # ─── DATABASE ─────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:systemforge_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: SystemForgeHikariPool
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000          # 5 minutes
      connection-timeout: 20000     # 20 seconds
      max-lifetime: 1200000         # 20 minutes
      leak-detection-threshold: 60000

  # ─── REDIS ───────────────────────────────────────────────────────────────
  redis:
    host: ${SPRING_REDIS_HOST:localhost}
    port: ${SPRING_REDIS_PORT:6379}
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
    timeout: 2000ms

  # ─── FLYWAY ───────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false

  # ─── JPA ──────────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: none               # Flyway manages the schema — no Hibernate validation needed
    show-sql: false                 # Disable in prod — use P6Spy or datasource proxy instead
    open-in-view: false             # Prevents lazy loading issues — keep OFF always
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        use_sql_comments: false
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true
        cache:
          use_second_level_cache: false  # Enable with Redis later

  # ─── OPEN AI ───────────────────────────────────────────
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-4o-mini

  # ─── REDIS (Future) ───────────────────────────────────────────────────────
  # data:
  #   redis:
  #     host: ${REDIS_HOST:localhost}
  #     port: ${REDIS_PORT:6379}
  #     password: ${REDIS_PASSWORD:}
  #     timeout: 3000
  #     lettuce:
  #       pool:
  #         max-active: 10
  #         max-idle: 5
  #         min-idle: 1

  # ─── KAFKA (Future) ───────────────────────────────────────────────────────
  # kafka:
  #   bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
  #   producer:
  #     key-serializer: org.apache.kafka.common.serialization.StringSerializer
  #     value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  #     acks: all
  #     retries: 3
  #   consumer:
  #     group-id: systemforge-consumer
  #     auto-offset-reset: earliest
  #     key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  #     value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

# ─── JWT ────────────────────────────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:changeme-replace-with-256bit-base64-encoded-secret-in-prod}
    access-token-expiry-ms: 900000       # 15 minutes
    refresh-token-expiry-ms: 604800000   # 7 days
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ─── SPRINGDOC / SWAGGER ────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true

# ─── ACTUATOR (Future monitoring) ───────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ─── LOGGING ────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.systemforge: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n"
  file:
    name: logs/systemforge.log