server:
  port: 8080
  servlet:
    context-path: /
  error:
    include-message: never       # Never expose internal error messages to client
    include-stacktrace: never
  shutdown: graceful              # Allow in-flight requests to complete on SIGTERM
  tomcat:
    max-http-form-post-size: 2MB  # Limit form POST body size
    max-swallow-size: 2MB         # Max body to swallow on connection close
  max-http-request-header-size: 16KB

spring:
  profiles:
    active: dev
  application:
    name: systemforge-backend
  main:
    allow-bean-definition-overriding: true
  cache:
    type: ${SPRING_CACHE_TYPE:none}
  lifecycle:
    timeout-per-shutdown-phase: 30s  # Max wait for async tasks on shutdown
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

  # ─── DATABASE ─────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:systemforge_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: SystemForgeHikariPool
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000          # 5 minutes
      connection-timeout: 20000     # 20 seconds
      max-lifetime: 1200000         # 20 minutes
      leak-detection-threshold: 60000

  # ─── REDIS ───────────────────────────────────────────────────────────────
  redis:
    host: ${SPRING_REDIS_HOST:localhost}
    port: ${SPRING_REDIS_PORT:6379}
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
    timeout: 2000ms

  # ─── FLYWAY ───────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false

  # ─── JPA ──────────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: none               # Flyway manages the schema — no Hibernate validation needed
    show-sql: false                 # Disable in prod — use P6Spy or datasource proxy instead
    open-in-view: false             # Prevents lazy loading issues — keep OFF always
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        use_sql_comments: false
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true
        cache:
          use_second_level_cache: false  # Enable with Redis later

  # ─── LLM / OPEN AI ───────────────────────────────────────────
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}

# ─── LLM Model (used by MABA pipeline and Architect) ────────────────────
openai:
  model: ${OPENAI_MODEL:gpt-4o-mini}

  # ─── REDIS (Future) ───────────────────────────────────────────────────────
