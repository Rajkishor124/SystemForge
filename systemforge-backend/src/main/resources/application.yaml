# ─── JWT ────────────────────────────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:changeme-replace-with-256bit-base64-encoded-secret-in-prod}
    access-token-expiry-ms: 900000       # 15 minutes
    refresh-token-expiry-ms: 604800000   # 7 days
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  rate-limit:
    otp:
      capacity: 5
      refill-minutes: 15
    login:
      capacity: 10
      refill-minutes: 5
    generate:
      capacity: 3
      refill-minutes: 60
    architect-chat:
      capacity: 10
      refill-minutes: 10

# ─── SPRINGDOC / SWAGGER ────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true

# ─── RESILIENCE4J ───────────────────────────────────────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      openai:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 45s
        slow-call-rate-threshold: 80
        record-exceptions:
          - java.net.SocketTimeoutException
          - java.net.ConnectException
          - java.io.IOException
          - java.lang.RuntimeException
        ignore-exceptions:
          - java.lang.IllegalArgumentException
          - jakarta.validation.ValidationException
  retry:
    instances:
      openai:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.net.SocketTimeoutException
          - java.net.ConnectException
          - java.io.IOException
          - java.lang.RuntimeException

# ─── ACTUATOR (Production Monitoring) ───────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers,circuitbreakerevents
  endpoint:
    health:
      show-details: when-authorized
  health:
    circuitbreakers:
      enabled: true

# ─── LOGGING ────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.systemforge: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    io.github.resilience4j: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n"
  file:
    name: logs/systemforge.log